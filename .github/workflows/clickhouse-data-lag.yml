name: ClickHouse Data Lag Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for today's data
        id: check
        run: |
          MAX_DATE=$(curl -s -X POST 'https://sql-clickhouse.clickhouse.com:8443/?user=demo' \
            --data-binary "SELECT max(date) AS max_date FROM pypi.pypi_downloads_per_day WHERE project = 'gac' FORMAT JSONEachRow" \
            | jq -r '.max_date')

          TODAY=$(date -u +%Y-%m-%d)

          echo "max_date=$MAX_DATE" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT

          if [ "$MAX_DATE" = "$TODAY" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CHECKED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          FOUND="${{ steps.check.outputs.found }}"
          MAX_DATE="${{ steps.check.outputs.max_date }}"
          TODAY="${{ steps.check.outputs.today }}"

          if [ "$FOUND" = "true" ]; then
            TITLE="📡 ClickHouse lag — today's data is live"
            COLOR=3066993
          else
            TITLE="📡 ClickHouse lag — latest data is $MAX_DATE (today is $TODAY)"
            COLOR=15158332
          fi

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"$TITLE\",
                \"color\": $COLOR,
                \"fields\": [
                  {
                    \"name\": \"Latest date in ClickHouse\",
                    \"value\": \"$MAX_DATE\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"Checked at\",
                    \"value\": \"$CHECKED_AT\",
                    \"inline\": true
                  }
                ]
              }]
            }"
